<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Maintenance | We'll Be Back Soon</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #cbd5e1;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-wrapper {
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            color: var(--accent-color);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #94a3b8;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 24px; }
            p { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Professional System/Wrench SVG Icon -->
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l5.653-4.655m4.655 4.655a1.2 1.2 0 0 1-1.698 0l-2.957-2.957a1.2 1.2 0 0 1 0-1.698l1.562-1.562a1.2 1.2 0 0 1 1.698 0l2.957 2.957a1.2 1.2 0 0 1 0 1.698l-1.562 1.562ZM12 8.25a8.25 8.25 0 1 1-16.5 0 8.25 8.25 0 0 1 16.5 0Z" />
            </svg>
        </div>

        <div class="status-badge">Scheduled Maintenance</div>
        
        <h1>We'll Be Back Soon</h1>
        
        <p>Our system is currently undergoing routine maintenance and security optimizations to improve your experience. We apologize for any inconvenience caused and appreciate your patience.</p>
        
        <div class="footer">
            <p>Need urgent assistance? Contact <a href="mailto:support@yourdomain.com">Support Team</a></p>
        </div>
    </div>

</body>
</html>
