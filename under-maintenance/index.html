<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Maintenance | We'll Be Back Soon</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #cbd5e1;
            --accent-color: #38bdf8;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* --- চমৎকার অ্যানিমেটেড ব্যাকগ্রাউন্ড গ্রিড ও পার্টিকল ইফেক্ট --- */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle, rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px, 80px 80px, 80px 80px;
            background-position: center;
            animation: backgroundMove 60s linear infinite;
            z-index: 1;
        }

        /* গ্লোয়িং লাইট ইফেক্ট */
        .glow-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            animation: glowPulse 8s ease-in-out infinite;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.1);
            backdrop-filter: blur(12px); /* গ্লাস ইফেক্ট */
            -webkit-backdrop-filter: blur(12px);
            z-index: 3;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCard 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .icon-wrapper {
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 85px;
            height: 85px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            color: var(--accent-color);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .icon-wrapper svg {
            width: 42px;
            height: 42px;
            animation: iconRotate 4s ease-in-out infinite; /* রেঞ্চ আইকন রোটেশন */
        }

        h1 {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #94a3b8;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            border: 1px solid rgba(56, 189, 248, 0.25);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .footer a:hover {
            color: #7dd3fc;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        /* --- সকল অ্যানিমেশন কী-ফ্রেম --- */
        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes iconRotate {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-15deg); }
            40% { transform: rotate(20deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(10deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            50% { box-shadow: 0 0 12px 2px rgba(56, 189, 248, 0.2); }
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 24px; }
            p { font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড গ্লো ইফেক্ট -->
    <div class="glow-bg"></div>

    <div class="container">
        <!-- অ্যানিমেটেড মেকানিক্যাল আইকন -->
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l5.653-4.655m4.655 4.655a1.2 1.2 0 0 1-1.698 0l-2.957-2.957a1.2 1.2 0 0 1 0-1.698l1.562-1.562a1.2 1.2 0 0 1 1.698 0l2.957 2.957a1.2 1.2 0 0 1 0 1.698l-1.562 1.562ZM12 8.25a8.25 8.25 0 1 1-16.5 0 8.25 8.25 0 0 1 16.5 0Z" />
            </svg>
        </div>

        <div class="status-badge">Scheduled Maintenance</div>
        
        <h1>We'll Be Back Soon</h1>
        
        <p>Our system is currently undergoing routine maintenance and security optimizations to improve your experience. We apologize for any inconvenience caused and appreciate your patience.</p>
        
        <div class="footer">
            <p>Need urgent assistance? Contact <a href="mailto:support@yourdomain.com">Support Team</a></p>
        </div>
    </div>

</body>
</html>
