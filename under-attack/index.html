<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Screening | Under DDoS Protection</title>
    <style>
        :root {
            --bg-color: #090d16;
            --text-color: #94a3b8;
            --alert-color: #ef4444; /* Red color for alart */
            --card-bg: rgba(15, 23, 42, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* --- Cyber Matrix Scanning Background --- */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(239, 68, 68, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        /* --- Threat Radar Glow Effect --- */
        .radar-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.05) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            animation: radarPulse 4s infinite ease-in-out;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 3;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- Animated Threat Shield Icon --- */
        .icon-container {
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            background: rgba(239, 68, 68, 0.07);
            border-radius: 50%;
            color: var(--alert-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
            position: relative;
        }

        .icon-container svg {
            width: 44px;
            height: 44px;
            z-index: 2;
        }

        /* Scaning ring annimation */
        .icon-container::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--alert-color);
            border-radius: 50%;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: scanRotate 2s linear infinite;
        }

        h1 {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* --- Digital Cyber Loading Indicator --- */
        .checking-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            color: #ef4444;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dots {
            display: inline-flex;
            gap: 4px;
        }

        .dots span {
            width: 6px;
            height: 6px;
            background-color: var(--alert-color);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dots span:nth-child(2) { animation-delay: .2s; }
        .dots span:nth-child(3) { animation-delay: .4s; }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            font-size: 13px;
            color: #475569;
        }

        /* --- Animation Keyframes Configuration --- */
        @keyframes radarPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes scanRotate {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: .2; }
            20% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Threat Radar Glow Effect -->
    <div class="radar-glow"></div>

    <div class="container">
        <!-- Animated Threat Shield Icon -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751A11.956 11.956 0 0 1 12 2.714Z" />
            </svg>
        </div>

        <h1>Checking Your Connection</h1>
        
        <p>Our servers are currently mitigating a high volume of traffic. We are automatically verfiying your browser's security footprint to ensure a safe connection.</p>
        
        <!-- Digital Cyber Loading Indicator -->
        <div class="checking-box">
            <span>DDoS Protection Active. Filtering Traffic</span>
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <div class="footer">
            <p>This process is automated. You will be redirected shortly once verified.</p>
        </div>
    </div>

</body>
</html>
