<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Building Something Great</title>
    <style>
        :root {
            --bg-color: #0b0f17;
            --text-color: #94a3b8;
            --accent-color: #f59e0b; /* Construction Amber/Yellow */
            --card-bg: rgba(22, 30, 49, 0.75);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* --- Animated Blueprint Developer Grid --- */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(to right, rgba(245, 158, 11, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(245, 158, 11, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPan 40s linear infinite;
            z-index: 1;
        }

        /* Ambient Construction Glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.04) 0%, transparent 75%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            border: 1px solid rgba(245, 158, 11, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 3;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Developer Construction Logo Wrapper --- */
        .logo-container {
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: rgba(245, 158, 11, 0.04);
            border-radius: 24px;
            color: var(--accent-color);
            border: 1px solid rgba(245, 158, 11, 0.15);
            position: relative;
            box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.05);
        }

        /* --- Laser Indicator Dot --- */
        .logo-container::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            top: 12px;
            right: 12px;
            box-shadow: 0 0 10px var(--accent-color);
            animation: laserBlink 1s infinite steps(2);
        }

        h1 {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #94a3b8;
        }

        /* --- Advanced Animated Progress Bar --- */
        .progress-wrapper {
            margin-bottom: 35px;
            text-align: left;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #a1a1aa;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar-fill {
            height: 100%;
            width: 75%;
            background: linear-gradient(
                90deg, 
                #d97706 0%, 
                #f59e0b 50%, 
                #fbbf24 100%
            );
            border-radius: 4px;
            position: relative;
            animation: fillProgress 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* --- Animated Progress Stripes --- */
        .progress-bar-fill::before {
            content: "";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(
                45deg,
                rgba(0, 0, 0, 0.15) 25%,
                transparent 25%,
                transparent 50%,
                rgba(0, 0, 0, 0.15) 50%,
                rgba(0, 0, 0, 0.15) 75%,
                transparent 75%,
                transparent
            );
            background-size: 16px 16px;
            animation: moveStripes 1s linear infinite;
        }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 25px;
            font-size: 14px;
            color: #4b5563;
        }

        /* --- Animation Keyframes Configuration --- */
        @keyframes gridPan {
            from { transform: translate(0, 0); }
            to { transform: translate(-50px, -50px); }
        }

        @keyframes laserBlink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 75%; }
        }

        @keyframes moveStripes {
            from { background-position: 0 0; }
            to { background-position: 16px 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Live Gear Rotation Animation --- */
        @keyframes gearRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container { padding: 35px 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="container">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
                <defs>
                    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <g stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" fill="none">
                    <path d="M 28 38 L 15 50 L 28 62" />
                    <path d="M 72 38 L 85 50 L 72 62" />
                </g>

                <g filter="url(#neon-glow)">
                    <circle cx="50" cy="50" r="16" fill="none" stroke="#f59e0b" stroke-width="5" />
                    <g stroke="#f59e0b" stroke-width="6" stroke-linecap="round" style="animation: gearRotate 8s linear infinite; transform-origin: 50px 50px;">
                        <line x1="50" y1="26" x2="50" y2="32" />
                        <line x1="50" y1="68" x2="50" y2="74" />
                        <line x1="26" y1="50" x2="32" y2="50" />
                        <line x1="68" y1="50" x2="74" y2="50" />
                        <line x1="33" y1="33" x2="38" y2="38" />
                        <line x1="62" y1="62" x2="67" y2="67" />
                        <line x1="67" y1="33" x2="62" y2="38" />
                        <line x1="38" y1="62" x2="33" y2="67" />
                    </g>
                </g>
                
                <circle cx="50" cy="50" r="6" fill="#0b0f17" stroke="#f59e0b" stroke-width="2" />
            </svg>
        </div>

        <h1>Something Exciting Is Coming</h1>
        
        <p>Our website is currently under construction as we are building a brand new digital experience. We are fine-tuning the architecture and security frameworks to serve you better.</p>
        
        <div class="progress-wrapper">
            <div class="progress-labels">
                <span>Development Progress</span>
                <span>75%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>Stay tuned! We are launching very soon.</p>
        </div>
    </div>

</body>
</html>
